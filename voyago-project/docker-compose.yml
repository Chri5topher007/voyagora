
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voyagora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-voyagora}
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voyagora}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    ports: ["3000:3000"]
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-voyagora}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-voyagora}?schema=public
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    # Wait for DB to be healthy, then push schema and start.
    # NOTE: this does NOT seed demo data automatically. To load demo
    # accounts/tours for a staging environment only, run manually:
    #   docker compose exec api npm run seed
    command: sh -c "npm run start:prod"

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    ports: ["8080:80"]
    depends_on:
      - api

volumes:
  pgdata:
